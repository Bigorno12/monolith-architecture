openapi: 3.0.3
info:
  title: Monolith Architecture - OpenAPI 3.0
  version: 1.0.11
servers:
  - url: http://localhost:8080
    description: Local Server
tags:
  - name: auth
    description: Authentication (Keycloak-backed)
  - name: user
    description: Operations about the authenticated user
  - name: todo
    description: Todo management
  - name: admin
    description: Admin operations
security:
  - bearerHttpAuthentication: []
paths:
  /api/v2/auth/register:
    post:
      tags:
        - auth
      summary: "Register new user"
      operationId: registerUser
      security: []
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeaderV2'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '200':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Unauthorized

  /api/v2/auth/login:
    post:
      tags:
        - auth
      summary: "Authenticate user"
      operationId: authenticateUser
      security: []
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeaderV2'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthenticationRequest'
      responses:
        '200':
          description: User authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Unauthorized

  /api/v1/mono/user/update:
    put:
      tags:
        - user
      summary: "Update the authenticated user's profile"
      operationId: updateUser
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - name: username
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserRequest'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/mono/user/delete/{username}:
    delete:
      tags:
        - user
      summary: "Delete the authenticated user"
      operationId: deleteUser
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/mono/user/view-profile/{username}:
    get:
      tags:
        - user
      summary: "View the authenticated user's profile"
      operationId: viewUserProfile
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Profile fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ViewUserProfile'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/mono/todo/{username}:
    post:
      tags:
        - todo
      summary: "Create an empty todo list for a user"
      operationId: createTodoForUser
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Todo created successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/mono/todo/save/{username}:
    post:
      tags:
        - todo
      summary: "Save a list of todos for a user"
      operationId: saveTodos
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/TodoRequest'
      responses:
        '200':
          description: Todos saved successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/mono/todo/all-todos/{username}:
    get:
      tags:
        - todo
      summary: "List all todos for a user (paginated)"
      operationId: findAllTodosByUsername
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: pageNum
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Todos fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/TodoUsernameResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/v1/mono/admin/{id}:
    get:
      tags:
        - admin
      summary: "Find a user by id (admin only)"
      operationId: findUserById
      parameters:
        - $ref: '#/components/parameters/ApiVersionHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: User not found

components:
  securitySchemes:
    bearerHttpAuthentication:
      description: Bearer token using a JWT
      type: http
      scheme: Bearer
      bearerFormat: JWT
  parameters:
    ApiVersionHeader:
      name: X-API-Version
      in: header
      required: true
      schema:
        type: string
        default: "1.0"
        example: "1.0"
    ApiVersionHeaderV2:
      name: X-API-Version
      in: header
      required: true
      schema:
        type: string
        default: "2.0"
        example: "2.0"
  schemas:
    UserRequest:
      type: object
      properties:
        firstName:
          type: string
          nullable: false
          example: John
        lastName:
          type: string
          nullable: false
          example: Doe
        age:
          type: integer
          format: int32
          minimum: 16
          maximum: 100
          example: 25
        gender:
          $ref: '#/components/schemas/Gender'
        email:
          type: string
          format: email
          nullable: false
        username:
          type: string
          nullable: false
          example: test
        role:
          $ref: '#/components/schemas/Role'
        password:
          type: string
          nullable: false
          example: P@ssW0rd%
    AuthenticationRequest:
      type: object
      properties:
        username:
          type: string
          nullable: false
          example: test
        password:
          type: string
          nullable: false
          example: P@ssW0rd%
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          nullable: false
        refresh_token:
          type: string
          nullable: false
    UpdateUserRequest:
      type: object
      properties:
        firstname:
          type: string
          nullable: false
          example: John
        lastname:
          type: string
          nullable: false
          example: Doe
        age:
          type: integer
          format: int32
          minimum: 16
          maximum: 100
          example: 25
        gender:
          $ref: '#/components/schemas/Gender'
        email:
          type: string
          nullable: false
          example: john.doe@test.com
        username:
          type: string
          nullable: false
          example: test
    UserResponse:
      type: object
      properties:
        firstName:
          type: string
          nullable: false
          example: John
        lastName:
          type: string
          nullable: false
          example: Doe
        age:
          type: integer
          format: int32
          example: 25
        gender:
          $ref: '#/components/schemas/Gender'
        email:
          type: string
          nullable: false
          example: john.doe@test.com
        username:
          type: string
          nullable: false
          example: test
    ViewUserProfile:
      type: object
      properties:
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        username:
          type: string
          example: test
        email:
          type: string
          example: john.doe@test.com
        age:
          type: integer
          example: 25
    TodoRequest:
      type: object
      properties:
        title:
          type: string
          nullable: false
          example: delectus aut autem
        completed:
          type: boolean
          nullable: false
    TodoUsernameResponse:
      type: object
      properties:
        title:
          type: string
          nullable: false
          example: delectus aut autem
        completed:
          type: boolean
          nullable: false
        username:
          type: string
          nullable: false
          example: test
    Gender:
      type: string
      enum:
        - MALE
        - FEMALE
        - OTHER
    Role:
      type: string
      enum:
        - USER
        - ADMIN
