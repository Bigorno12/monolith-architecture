### Logging Configuration ###
logging.level.org.flywaydb=warn
logging.level.org.hibernate.sql=warn
logging.level.root=info


### Hibernate Configuration ###
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.default_batch_fetch_size=32
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false


### Database Configuration ###
spring.jpa.show-sql=false
spring.datasource.url=${WELLDEV_URL}
spring.datasource.username=${WELLDEV_USERNAME}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.password=${WELLDEV_PASSWORD}


### Hikari Configuration ###
spring.datasource.hikari.pool-name=HikariPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=2000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.data-source-properties.useServerPrepStmts=false
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=500
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=1024
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED


### Flyway Configuration ###
spring.flyway.user=${WELLDEV_USERNAME}
spring.flyway.password=${WELLDEV_PASSWORD}
spring.flyway.url=${WELLDEV_URL}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db.migration
spring.flyway.baseline-on-migrate=true