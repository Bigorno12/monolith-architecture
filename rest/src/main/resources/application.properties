### Server Configuration ###
server.port=8080
server.tomcat.threads.min-spare=20
server.tomcat.threads.max=200
server.tomcat.connection-timeout=20000
server.tomcat.keep-alive-timeout=15000
server.tomcat.max-keep-alive-requests=100
server.tomcat.accept-count=100
server.compression.enabled=true
server.compression.mime-types=application/json, application/xml, text/xml, text/plain
server.compression.min-response-size=1024


### Spring Configuration ###
spring.mvc.apiversion.use.header=X-API-Version
spring.application.name="MonolithArchitecture"
spring.profiles.active="@spring.profiles.active@"
spring.threads.virtual.enabled=true
spring.jpa.open-in-view=false
spring.datasource.hikari.auto-commit=false
spring.main.lazy-initialization=true
spring.jackson.default-property-inclusion=non_null
springdoc.swagger-ui.path=/swagger-ui.html


### Spring Cache Configuration ###
spring.cache.type=caffeine
spring.cache.caffeine.spec=initialCapacity=50,maximumSize=10,expireAfterAccess=300s
spring.cache.cache-names=jsonPlaceHolder, userCache, todoCache, adminCache, fingerprintCache


### Spring Security Configuration ###
spring.security.filter.dispatcher-types=async, error, request
spring.security.oauth2.client.provider.monolith-keycloak.issuer-uri=${WELLDEV.KEYCLOAK.ISSUER-URI}
spring.security.oauth2.client.registration.keycloak.provider=${WELLDEV.KEYCLOAK.REALM}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.client-id=${WELLDEV.KEYCLOAK.CLIENT-ID}
spring.security.oauth2.client.registration.keycloak.client-secret=${WELLDEV.KEYCLOAK.CLIENT-SECRET}
spring.security.oauth2.client.registration.keycloak.scope=openid, profile
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${WELLDEV.RESOURCESERVER.JWT.SET.URI}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${WELLDEV.RESOURCESERVER.JWT.ISSUER.URI}


### Keycloak Configuration ###
application.keycloak.server-url=${WELLDEV.KEYCLOAK.SERVER.URL}
application.keycloak.realm=${WELLDEV.KEYCLOAK.REALM}
application.keycloak.client-id=${WELLDEV.KEYCLOAK.CLIENT-ID}
application.keycloak.client-secret=${WELLDEV.KEYCLOAK.CLIENT-SECRET}
application.aes.secret-key=${WELLDEV.AES.SECRET.KEY}


### Circuit Breaker Configuration ###
resilience4j.circuitbreaker.instances.keycloakService.register-health-indicator=true
resilience4j.circuitbreaker.instances.keycloakService.sliding-window-size=10
resilience4j.circuitbreaker.instances.keycloakService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.keycloakService.sliding-window-type=count_based
resilience4j.circuitbreaker.instances.keycloakService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.keycloakService.wait-duration-in-open-state.seconds=10
resilience4j.circuitbreaker.instances.keycloakService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.keycloakService.event-consumer-buffer-size=10
resilience4j.circuitbreaker.instances.keycloakService.ignore-exceptions=mu.server.service.exception.NotFoundException

resilience4j.circuitbreaker.instances.userService.register-health-indicator=true
resilience4j.circuitbreaker.instances.userService.sliding-window-size=10
resilience4j.circuitbreaker.instances.userService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.userService.sliding-window-type=count_based
resilience4j.circuitbreaker.instances.userService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.userService.wait-duration-in-open-state.seconds=10
resilience4j.circuitbreaker.instances.userService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.userService.event-consumer-buffer-size=10

### Actuator Configuration ###
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true