name: Main CI Orchestrator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-entire-pipeline:
    uses: Bigorno12/ci-cd-templates/.github/workflows/maven-master-pipeline.yml@main
    secrets: inherit
    with:
      build-egress-policy: "block"

      build-allowed-endpoints: >
        github.com:443
        repo.maven.apache.org:443
        api.github.com:443
        repo.spring.io:443
        repository.jboss.org:443

      test-allowed-endpoints: >
        github.com:443
        repo.maven.apache.org:443
        repo.spring.io:443
        repository.jboss.org:443

      security-allowed-endpoints: >
        api.github.com:443
        github.com:443
        release-assets.githubusercontent.com:443
        repo.maven.apache.org:443
        repo.spring.io:443
        repository.jboss.org:443

      docker-allowed-endpoints: >
        auth.docker.io:443
        ghcr.io:443
        github.com:443
        production.cloudfront.docker.com:443
        registry-1.docker.io:443
        release-assets.githubusercontent.com:443
        repo1.maven.org:443
        api.github.com:443
        objects.githubusercontent.com:443
        pkg-containers.githubusercontent.com:443

      spring-boot-args: "-P dev -pl rest -am"
      test-args: >
        -DWELLDEV_URL=jdbc:mysql://localhost:3306/${{ MYSQL_DATABASE }}
        -DWELLDEV_USERNAME=${{ MYSQL_USER }}
        -DWELLDEV_PASSWORD=${{ MYSQL_PASSWORD }}
        -DWELLDEV.KEYCLOAK.REALM=${{ KEYCLOAK_REALM }}
        -DWELLDEV.KEYCLOAK.CLIENT-ID=${{ KEYCLOAK_CLIENT_ID }}
        -DWELLDEV.KEYCLOAK.CLIENT-SECRET=${{ KEYCLOAK_CLIENT_SECRET }}
        -DWELLDEV.AES.SECRET.KEY=${{ AES_SECRET_KEY }}
        -DPOSTGRES_USER=${{ POSTGRES_USER }}
        -DPOSTGRES_PASSWORD=${{ POSTGRES_PASSWORD }}
        -DPOSTGRES_DB=${{ POSTGRES_DB }}