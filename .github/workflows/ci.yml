name: Main CI Orchestrator

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-entire-pipeline:
    uses: Bigorno12/ci-cd-templates/.github/workflows/master-maven-pipeline.yml@v0.0.6
    secrets: inherit
    with:
      java-version: '25'
      cache-type: 'maven'
      build-egress-policy: "block"
      spring-boot-args: "-P dev -pl rest -am"
      test-args: >
        -Dspring.profiles.active=dev