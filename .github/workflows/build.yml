name: build Module

on:
  workflow_call:

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      security-events: write
      checks: write
      pull-requests: write
    steps:

      - name: Harden Runner
        uses: step-security/harden-runner@v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            repo.maven.apache.org:443
            api.github.com:443
            repo.spring.io:443
            repository.jboss.org:443

      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reject .env file
        run: |
          ENV_FILES=$(git ls-files --cached -- '*.env' ':!:.env.example' | grep -v '\.env\.example$' || true)
          if [ -n "$ENV_FILES" ]; then
            echo "::error::Tracked .env files detected – remove them before merging:"
            echo "$ENV_FILES"
            exit 1
          fi

      - name: Setup Java Environment
        uses: ./.github/setup-java-env
        with:
          maven-opts: '-Xms1g -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication -XX:MaxMetaspaceSize=256m'

      - name: Compile and Package
        run: mvn -B clean package -DskipTests --file pom.xml

      - name: Update dependency graph
        if: github.event_name == 'push'
        uses: advanced-security/maven-dependency-submission-action@v5


