name: Java CI with Maven

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write
  security-events: write
  statuses: write

env:
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
  MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
  MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
  KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
  KEYCLOAK_ADMIN: ${{ secrets.KEYCLOAK_ADMIN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Reject .env files
        run: |
          ENV_FILES=$(git ls-files --cached -- '*.env' ':!:.env.example' | grep -v '\.env\.example$' || true)
          if [ -n "$ENV_FILES" ]; then
            echo "::error::Tracked .env files detected – remove them before merging:"
            echo "$ENV_FILES"
            exit 1
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test with Maven
        run: mvn -B -T 1C verify --file pom.xml
        env:
          MAVEN_OPTS: >-
            -Xms1g -Xmx1g
            -XX:+UseG1GC
            -XX:MaxGCPauseMillis=200
            -XX:+UseStringDeduplication
            -XX:MaxMetaspaceSize=256m

      - name: Update dependency graph
        if: github.event_name == 'push'
        uses: advanced-security/maven-dependency-submission-action@v5

      - name: Tag PR build
        if: success() && github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
        env:
          TAG: pr-${{ github.event.pull_request.number }}-run-${{ github.run_number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "CI tag $TAG"
          git push origin "$TAG"

          # Cleanup old PR tags (keep latest 4)
          TAGS_TO_DELETE=$(git tag -l "pr-${PR_NUMBER}-run-*" | sort -t'-' -k4 -nr | tail -n +4)
          for TAG in $TAGS_TO_DELETE; do
            echo "Deleting tag: $TAG"
            git push origin --delete "$TAG" || true
            git tag -d "$TAG" || true
          done

  build-gate:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build result
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build failed or was cancelled"
            exit 1
          fi
          echo "Build passed"
