name: Java CI with Maven

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  security-events: write

env:
  WELLDEV_URL: jdbc:mysql://localhost:3306/${{ secrets.MYSQL_DATABASE }}
  WELLDEV_USERNAME: ${{ secrets.MYSQL_USER }}
  WELLDEV_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}

  WELLDEV.KEYCLOAK.SERVER.URL: http://localhost:7080
  WELLDEV.KEYCLOAK.REALM: ${{ secrets.KEYCLOAK_REALM }}
  WELLDEV.KEYCLOAK.CLIENT-ID: ${{ secrets.KEYCLOAK_CLIENT_ID }}
  WELLDEV.KEYCLOAK.CLIENT-SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}

  WELLDEV.KEYCLOAK.ISSUER-URI: http://localhost:7080/realms/${{ secrets.KEYCLOAK_REALM }}
  WELLDEV.RESOURCESERVER.JWT.SET.URI: http://localhost:7080/realms/${{ secrets.KEYCLOAK_REALM }}/protocol/openid-connect/certs
  WELLDEV.RESOURCESERVER.JWT.ISSUER.URI: http://localhost:7080/realms/${{ secrets.KEYCLOAK_REALM }}
  WELLDEV.AES.SECRET.KEY: ${{ secrets.AES_SECRET_KEY }}

  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      security-events: write
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Reject .env files
        run: |
          ENV_FILES=$(git ls-files --cached -- '*.env' ':!:.env.example' | grep -v '\.env\.example$' || true)
          if [ -n "$ENV_FILES" ]; then
            echo "::error::Tracked .env files detected – remove them before merging:"
            echo "$ENV_FILES"
            exit 1
          fi

      - name: Start Docker Containers
        run: docker compose -f infra/docker-compose.yaml up -d --wait
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          KEYCLOAK_HOSTNAME: localhost
          KEYCLOAK_ADMIN: ${{ secrets.KEYCLOAK_ADMIN }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test with Maven
        run: mvn -B -T 1C verify --file pom.xml
        env:
          MAVEN_OPTS: >-
            -Xms1g -Xmx1g
            -XX:+UseG1GC
            -XX:MaxGCPauseMillis=200
            -XX:+UseStringDeduplication
            -XX:MaxMetaspaceSize=256m

      - name: Update dependency graph
        if: github.event_name == 'push'
        uses: advanced-security/maven-dependency-submission-action@v5

  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin

      - name: Compile for CodeQL
        run: mvn clean compile -Dkotlin.version=2.3.21 -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  gitleaks:
    name: Gitleaks Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  tag-pr:
    needs: build
    if: success() && github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true

      - name: Tag PR build
        env:
          TAG: pr-${{ github.event.pull_request.number }}-run-${{ github.run_number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git tag -a "$TAG" -m "CI tag $TAG"
          git push origin "refs/tags/$TAG"

          echo "Finding old tags for PR $PR_NUMBER..."
          
          TAGS_TO_DELETE=$(git tag -l "pr-${PR_NUMBER}-run-*" | sort -t'-' -k4 -nr | tail -n +5)
          
          if [ -z "$TAGS_TO_DELETE" ]; then
            echo "No old tags found to delete."
          else
            for OLD_TAG in $TAGS_TO_DELETE; do
              echo "Deleting tag: $OLD_TAG"
              git push origin --delete "refs/tags/$OLD_TAG" || echo "Failed to delete remote tag"
              git tag -d "$OLD_TAG" || echo "Failed to delete local tag"
            done
          fi

  build-gate:
    needs: [build, tag-pr, codeql, gitleaks]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check pipeline result
        run: |
          if [ "${{ needs.build.result }}" == "failure" ] || \
             [ "${{ needs.codeql.result }}" == "failure" ] || \
             [ "${{ needs.tag-pr.result }}" == "failure" ] || \
             [ "${{ needs.gitleaks.result}}" == "failure" ]; then
            echo "Pipeline failed"
            exit 1
          fi
          echo "Pipeline passed"