name: Tagging Module

on:
  workflow_call:


jobs:
  tag-pr:
    name: Tag Pull Request
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true

      - name: Tag PR Build
        env:
          TAG: pr-${{ github.event.pull_request.number }}-run-${{ github.run_number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "CI tag $TAG"
          git push origin "$TAG"

          # Cleanup old PR tags (keep latest 4)
          TAGS_TO_DELETE=$(git tag -l "pr-${PR_NUMBER}-run-*" | sort -t'-' -k4 -nr | tail -n +4)
          for TAG in $TAGS_TO_DELETE; do
            echo "Deleting tag: $TAG"
            git push origin --delete "$TAG" || true
            git tag -d "$TAG" || true
          done