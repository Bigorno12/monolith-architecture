name: Tagging Module

on:
  workflow_call:


jobs:
  tag-pr:
    name: Tag Pull Request
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      - name: Harden Runner
        uses: step-security/harden-runner@v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true

      - name: Tag PR Build
        env:
          TAG: pr-${{ github.event.pull_request.number }}-run-${{ github.run_number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "CI tag $TAG"
          git push origin "$TAG"

          TAGS_TO_DELETE=$(git ls-remote --tags origin "refs/tags/pr-${PR_NUMBER}-run-*" | sed 's/.*refs\/tags\///' | sort -V -r | tail -n +5)

          for OLD_TAG in $TAGS_TO_DELETE; do
            echo "Deleting old tag: $OLD_TAG"
            git push origin --delete "$OLD_TAG"
          done