apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: monolith-cluster
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # NGINX Ingress (Standard Web Traffic)
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Spring Boot Monolith API
      - containerPort: 8080
        hostPort: 8080
        protocol: TCP
      # Keycloak Auth Server
      - containerPort: 7080
        hostPort: 7080
        protocol: TCP
      # MySQL Database (Helpful for connecting DataGrip/DBeaver directly to K8s)
      - containerPort: 3306
        hostPort: 3306
        protocol: TCP